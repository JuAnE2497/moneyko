<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Frame</title>
    <style>
        /* Removes default browser margins and makes the body fill the screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars on the main page */
        }
        
        /* Makes the iframe take up the entire viewport */
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Removes the default border */
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbyKDa-L0yOT47UNXeM64GUtHg5z7KEfMpwFVMJsNe3LBS7yAHoH0uA1uYdfGjEs0-VU/exec" title="MoneyKo"></iframe>

</body>
</html>
